name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Resolve website base
        id: site-base
        env:
          WEBSITE_BASE_OVERRIDE: ${{ vars.WEBSITE_BASE }}
          PAGES_HOST: ${{ steps.pages.outputs.host }}
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          if [ -n "$WEBSITE_BASE_OVERRIDE" ]; then
            resolved_base="$WEBSITE_BASE_OVERRIDE"
          elif [[ -n "$PAGES_HOST" && "$PAGES_HOST" != *.github.io ]]; then
            resolved_base="/"
          elif [ -n "$PAGES_BASE_PATH" ]; then
            resolved_base="${PAGES_BASE_PATH%/}/"
          else
            resolved_base="/"
          fi

          echo "resolved=$resolved_base" >> "$GITHUB_OUTPUT"
          echo "Using WEBSITE_BASE=$resolved_base"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        env:
          WEBSITE_BASE: ${{ steps.site-base.outputs.resolved }}
        working-directory: website
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
